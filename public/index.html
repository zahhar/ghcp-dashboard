<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Copilot Dashboard</title>
    <link rel="icon" type="image/png" href="ghcp-logo.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="header-content">
                <div style="display:flex;align-items:center;gap:0.75rem">
                    <img src="ghcp-logo.png" alt="GitHub Copilot" style="height:5rem;width:auto">
                    <h1>GitHub Copilot Dashboard</h1>
                </div>
                <p class="subtitle" style="margin-left: 5.75rem;">Insights into AI adoption</p>
            </div>
            <div class="header-stats">
                <div class="stat-box gradient-purple">
                    <span class="stat-label">Total Users</span>
                    <span class="stat-value" id="stat-total-users">--</span>
                    <span class="stat-diff" id="stat-diff-users"></span>
                </div>
                <div class="stat-box gradient-blue">
                    <span class="stat-label">Total Turns</span>
                    <span class="stat-value metric-high" id="stat-total-interactions">--</span>
                    <span class="stat-diff" id="stat-diff-interactions"></span>
                </div>
                <div class="stat-box glass" style="border-color: rgba(16, 185, 129, 0.3)">
                    <span class="stat-label">Total Output</span>
                    <span class="stat-value" id="stat-total-loc">--</span>
                    <span class="stat-diff" id="stat-diff-loc"></span>
                </div>
            </div>
        </header>

        <main class="single-layout">
            <!-- Daily Active Users -->
            <section class="card glass" id="dau-section">
                <div class="card-header dau-card-header" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none" id="dau-toggle" title="Click to collapse/expand">
                    <div style="display:flex;align-items:center;gap:0.6rem">
                        <span class="dau-chevron" id="dau-chevron">&#9660;</span>
                        <h2 style="color:var(--text-main)">Daily Active Users</h2>
                    </div>
                    <div id="dau-avg-stat" style="text-align:right;line-height:1.3"></div>
                </div>
                <div id="dau-chart-container" class="dau-collapsible"></div>
            </section>
            <!-- All Users -->
            <section class="card glass">
                <div class="card-header section-toggle-header" style="display:flex;align-items:center;gap:0.6rem;cursor:pointer;user-select:none;margin-bottom:0.75rem" id="users-toggle" title="Click to collapse/expand table">
                    <span class="section-chevron" id="users-chevron">&#9660;</span>
                    <h2 style="color:var(--text-main)">All Users</h2>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1.5rem">
                    <div style="flex:1;min-width:200px">
                        <input id="user-search" type="text" placeholder="🔍 Search users..."
                            class="search-input" />
                    </div>
                    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
                        <select id="scope-filter"
                            style="padding:0.5rem 1rem;border-radius:8px;background:rgba(30,41,59,0.8);color:white;border:1px solid rgba(255,255,255,0.2);cursor:pointer;font-size:0.95rem;outline:none">
                            <option value="">All enterprises</option>
                        </select>
                        <select id="status-filter"
                            style="padding:0.5rem 1rem;border-radius:8px;background:rgba(30,41,59,0.8);color:white;border:1px solid rgba(255,255,255,0.2);cursor:pointer;font-size:0.95rem;outline:none">
                            <option value="">All users</option>
                            <option value="active" selected>Active</option>
                            <option value="revoked">Revoked</option>
                        </select>
                        <select id="team-filter"
                            style="padding:0.5rem 1rem;border-radius:8px;background:rgba(30,41,59,0.8);color:white;border:1px solid rgba(255,255,255,0.2);cursor:pointer;font-size:0.95rem;outline:none">
                            <option value="">All teams</option>
                        </select>
                        <select id="month-filter"
                            style="padding:0.5rem 1rem;border-radius:8px;background:rgba(30,41,59,0.8);color:white;border:1px solid rgba(255,255,255,0.2);cursor:pointer;font-size:0.95rem;outline:none">
                            <option value="">All times</option>
                        </select>
                    </div>
                </div>
                <div class="section-collapsible" id="users-table-collapsible">
                    <div class="table-container">
                        <table class="data-table" id="users-table">
                            <thead>
                                <tr>
                                    <th style="width:1%;white-space:nowrap">#</th>
                                    <th>User</th>
                                    <th title="Grand total = suggested + applied LOC&#10;💡 Suggested LOC = loc_suggested_to_add + loc_suggested_to_delete&#10;✏️ Applied LOC = loc_added + loc_deleted">Output</th>
                                    <th title="Total interaction turns&#10;🏃 Output LOC per turn (suggested + applied)&#10;🎯 Acceptance Rate: accepted / generated">Turns</th>
                                    <th>Steering</th>
                                    <th>Coding</th>
                                    <th>Perf</th>
                                    <th>Language</th>
                                    <th>Model</th>
                                    <th>IDE</th>
                                    <th>Days</th>
                                    <th>Activity</th>
                                </tr>
                            </thead>
                            <tbody id="users-body">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Output Breakdown -->
            <section class="card glass">
                <div class="card-header section-toggle-header" style="display:flex;align-items:center;gap:0.6rem;cursor:pointer;user-select:none" id="breakdown-toggle" title="Click to collapse/expand">
                    <span class="section-chevron" id="breakdown-chevron">&#9660;</span>
                    <h2 style="color:var(--text-main)">Output Breakdown</h2>
                </div>
                <div class="section-collapsible" id="breakdown-collapsible">
                    <div class="donut-grid">
                        <div id="donut-model"></div>
                        <div id="donut-language"></div>
                        <div id="donut-ide"></div>
                    </div>
                    <div class="donut-grid" style="margin-top:1.25rem">
                        <div id="donut-activity"></div>
                        <div id="donut-feature"></div>
                        <div id="donut-syntax"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <!-- User detail popup -->
    <div class="modal-overlay" id="user-modal" style="display:none;">
        <div class="modal glass">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
