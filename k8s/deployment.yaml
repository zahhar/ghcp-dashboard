apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghcp-stats
  namespace: scor-gits-prod
  labels:
    app: ghcp-stats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghcp-stats
  template:
    metadata:
      labels:
        app: ghcp-stats
    spec:
      imagePullSecrets:
        - name: gitlab-pull-secret
      containers:
        - name: ghcp-stats
          image: registry.git.epam.com/zahhar_kirillov/scor-ghcp-dashboard:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ghcp-stats
  namespace: scor-gits-prod
spec:
  selector:
    app: ghcp-stats
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
